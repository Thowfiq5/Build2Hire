<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Build2Hire | Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <header class="navbar" id="main-nav"></header>

  <main class="flex-center section-padding" style="min-height: 100vh; padding: 2rem;">
    <div class="card" style="width: 100%; max-width: 500px; padding: 2.5rem;">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <a href="index.html" style="font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; color: var(--text-primary); text-decoration: none; display: inline-block; margin-bottom: 0.5rem; letter-spacing: -0.02em;">
          Build2<span style="color: var(--primary);">Hire</span>
        </a>
        <h1 style="font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 0.25rem;">Join Build2Hire</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Showcase your work, get hired on merit.</p>
      </div>

      <!-- Role Toggle Button Switch -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; padding: 4px; background-color: var(--bg-tertiary); border-radius: var(--radius-md); margin-bottom: 1.5rem;">
        <button
          type="button"
          id="btn-candidate"
          class="btn"
          style="background-color: var(--bg-secondary); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 0.5rem;"
          onclick="setRole('candidate')"
        >
          Candidate
        </button>
        <button
          type="button"
          id="btn-recruiter"
          class="btn"
          style="background-color: transparent; color: var(--text-secondary); box-shadow: none; padding: 0.5rem;"
          onclick="setRole('recruiter')"
        >
          Recruiter
        </button>
      </div>

      <div id="alert-container"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input
            id="fullName"
            type="text"
            required
            class="form-control"
            placeholder="John Doe"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            id="email"
            type="email"
            required
            class="form-control"
            placeholder="john@example.com"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            required
            class="form-control"
            placeholder="Min 6 characters"
          >
        </div>

        <!-- Candidate-specific fields -->
        <div id="candidate-fields">
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number (Optional)</label>
            <input
              id="phone"
              type="tel"
              class="form-control"
              placeholder="+1 (555) 000-0000"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="bio">Professional Bio</label>
            <textarea
              id="bio"
              class="form-control"
              rows="3"
              placeholder="Briefly describe your skill set and builders mission..."
              style="resize: vertical;"
            ></textarea>
          </div>
        </div>

        <!-- Recruiter-specific fields (hidden by default) -->
        <div id="recruiter-fields" style="display: none;">
          <div class="form-group">
            <label class="form-label" for="companyName">Company Name</label>
            <input
              id="companyName"
              type="text"
              class="form-control"
              placeholder="e.g. InnovateTech"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="jobTitle">Job Title</label>
            <input
              id="jobTitle"
              type="text"
              class="form-control"
              placeholder="e.g. Senior Talent Acquisition"
            >
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Register
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Already have an account? 
        <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign In</a>
      </p>
    </div>
  </main>

  <script src="shared.js"></script>
  <script>
    renderHeader();
    let currentRole = "candidate";

    // ══════════════════════════════════════════════
    // EMAIL SIGN-UP
    // ══════════════════════════════════════════════

    function setRole(role) {
      currentRole = role;
      const btnCandidate = document.getElementById('btn-candidate');
      const btnRecruiter = document.getElementById('btn-recruiter');
      const candidateFields = document.getElementById('candidate-fields');
      const recruiterFields = document.getElementById('recruiter-fields');
      const companyInput = document.getElementById('companyName');
      const jobInput = document.getElementById('jobTitle');

      if (role === 'candidate') {
        btnCandidate.style.backgroundColor = "var(--bg-secondary)";
        btnCandidate.style.color = "var(--primary)";
        btnCandidate.style.boxShadow = "0 2px 8px rgba(0,0,0,0.05)";
        
        btnRecruiter.style.backgroundColor = "transparent";
        btnRecruiter.style.color = "var(--text-secondary)";
        btnRecruiter.style.boxShadow = "none";
        
        candidateFields.style.display = "block";
        recruiterFields.style.display = "none";
        companyInput.required = false;
        jobInput.required = false;
      } else {
        btnRecruiter.style.backgroundColor = "var(--bg-secondary)";
        btnRecruiter.style.color = "var(--primary)";
        btnRecruiter.style.boxShadow = "0 2px 8px rgba(0,0,0,0.05)";
        
        btnCandidate.style.backgroundColor = "transparent";
        btnCandidate.style.color = "var(--text-secondary)";
        btnCandidate.style.boxShadow = "none";
        
        recruiterFields.style.display = "block";
        candidateFields.style.display = "none";
        companyInput.required = true;
        jobInput.required = true;
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');

      const payload = {
        role: currentRole,
        fullName,
        email,
        password,
        phone: currentRole === "candidate" ? document.getElementById('phone').value : undefined,
        bio: currentRole === "candidate" ? document.getElementById('bio').value : undefined,
        jobTitle: currentRole === "recruiter" ? document.getElementById('jobTitle').value : undefined,
        companyName: currentRole === "recruiter" ? document.getElementById('companyName').value : undefined,
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account...";

      try {
        const res = await fetch("/api/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Failed to register");
        }

        sessionStorage.setItem('user', JSON.stringify(data.data));
        window.location.href = currentRole === "recruiter" ? "recruiter-dashboard.html" : "portfolio.html";
      } catch (err) {
        console.warn("Backend offline, using mock registration fallback:", err.message);

        const dbState = dbGet();
        let existingUser = dbState.users.find(u => u.email.toLowerCase() === email.toLowerCase());

        if (!existingUser) {
          existingUser = {
            id: Date.now(),
            email: email,
            role: currentRole,
            fullName: fullName
          };
          if (currentRole === 'candidate') {
            existingUser.phone = document.getElementById('phone').value || "";
            existingUser.bio = document.getElementById('bio').value || "";
            existingUser.githubUrl = "";
            existingUser.linkedinUrl = "";
            existingUser.portfolioWebsite = "";
            existingUser.skills = ["React", "JavaScript", "HTML", "CSS Variables"];
            existingUser.skillLevels = { "React": "Basic", "JavaScript": "Basic", "HTML": "Basic", "CSS Variables": "Basic" };
            existingUser.profileCompleted = false;
            existingUser.preferredRole = "";
            existingUser.xp_points = 0;
            existingUser.level = 1;
            existingUser.talent_score = 0;
            existingUser.portfolio_score = 40;
            existingUser.challenge_score = 0;
            existingUser.assessment_score = 0;
            existingUser.projects = [];
          } else {
            existingUser.companyName = document.getElementById('companyName').value || "InnovateTech";
            existingUser.jobTitle = document.getElementById('jobTitle').value || "Hiring Manager";
          }
          dbState.users.push(existingUser);
          dbSave(dbState);
        } else {
          // If the user already exists (like a seeded user email), update their name and details to match what they typed!
          existingUser.fullName = fullName;
          existingUser.role = currentRole;
          if (currentRole === 'candidate') {
            existingUser.phone = document.getElementById('phone').value || existingUser.phone || "";
            existingUser.bio = document.getElementById('bio').value || existingUser.bio || "";
          } else {
            existingUser.companyName = document.getElementById('companyName').value || existingUser.companyName || "InnovateTech";
            existingUser.jobTitle = document.getElementById('jobTitle').value || existingUser.jobTitle || "Hiring Manager";
          }
          dbSave(dbState);
        }

        sessionStorage.setItem('user', JSON.stringify(existingUser));
        showAlert('alert-container', 'Backend offline. Registered successfully with Demo account!', 'success');

        setTimeout(() => {
          window.location.href = currentRole === "recruiter" ? "recruiter-dashboard.html" : "portfolio.html";
        }, 1000);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Register";
      }
    });
  </script>
</body>
</html>
