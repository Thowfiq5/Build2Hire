<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Build2Hire</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <header class="navbar" id="main-nav"></header>

  <main class="flex-center" style="min-height: calc(100vh - 70px); margin-top: 70px; padding: 2rem;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 2.5rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h1>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Sign in to continue to Build2Hire</p>
      </div>

      <div id="alert-container"></div>

      <!-- ── Email / Password Form ── -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            id="email"
            type="email"
            required
            class="form-control"
            placeholder="you@example.com"
          >
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <div class="flex-between">
            <label class="form-label" for="password">Password</label>
          </div>
          <input
            id="password"
            type="password"
            required
            class="form-control"
            placeholder="••••••••"
          >
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
          Sign In
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? 
        <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign Up</a>
      </p>
    </div>
  </main>

  <script src="shared.js?v=1.0.1"></script>
  <script>
    renderHeader();

    // ══════════════════════════════════════════════
    // EMAIL / PASSWORD LOGIN
    // ══════════════════════════════════════════════
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in...";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.message || "Failed to log in");
        }

        sessionStorage.setItem('user', JSON.stringify(data.data));
        
        if (data.data.role === "admin") {
          window.location.href = "admin-dashboard.html";
        } else if (data.data.role === "recruiter") {
          window.location.href = "recruiter-dashboard.html";
        } else {
          if (data.data.profileCompleted) {
            window.location.href = "jobs.html";
          } else {
            window.location.href = "portfolio.html";
          }
        }
      } catch (err) {
        console.warn("Backend auth offline, using local database fallback:", err.message);
        
        const dbState = dbGet();
        let existingUser = dbState.users.find(u => u.email.toLowerCase() === email.toLowerCase());

        if (!existingUser) {
          showAlert('alert-container', '⚠️ User not found! Please register / sign up first or use default demo accounts.', 'error');
          return;
        }

        sessionStorage.setItem('user', JSON.stringify(existingUser));
        showAlert('alert-container', 'Logged in successfully!', 'success');
        
        setTimeout(() => {
          if (existingUser.role === "admin") {
            window.location.href = "admin-dashboard.html";
          } else if (existingUser.role === "recruiter") {
            window.location.href = "recruiter-dashboard.html";
          } else {
            if (existingUser.profileCompleted) {
              window.location.href = "jobs.html";
            } else {
              window.location.href = "portfolio.html";
            }
          }
        }, 1000);

      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
